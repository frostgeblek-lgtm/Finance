          <button onclick="buyAsset('${a.id}',1)" style="flex:1;padding:4px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);border-radius:4px;cursor:pointer;font-size:10px;" ${G.cash<price||G.ap<10?'disabled':''}>Buy 1</button>
          <button onclick="buyAsset('${a.id}',5)" style="flex:1;padding:4px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);color:var(--green);border-radius:4px;cursor:pointer;font-size:10px;" ${G.cash<price*5||G.ap<10?'disabled':''}>Buy 5</button>
          <button onclick="sellAsset('${a.id}',1)" style="flex:1;padding:4px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);border-radius:4px;cursor:pointer;font-size:10px;" ${owned<1||G.ap<5?'disabled':''}>Sell 1</button>
          <button onclick="sellAsset('${a.id}',${owned})" style="flex:1;padding:4px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--red);border-radius:4px;cursor:pointer;font-size:10px;" ${owned<1||G.ap<5?'disabled':''}>Sell All</button>
        </div>
      </div>
    `;
  }).join('');
  panel.innerHTML = `
    <div class="section-hdr">Market State: <span style="color:${G.economy==='boom'?'var(--green)':G.economy==='recession'?'var(--red)':'var(--text-primary)'}">${G.economy.toUpperCase()}</span></div>
    <div style="padding:4px 0 8px;font-size:10px;color:var(--text-muted)">Each trade costs 10 AP (buy) or 5 AP (sell). Markets fluctuate every quarter.</div>
    ${rows}
    <div class="section-hdr" style="margin-top:4px;">Portfolio Value</div>
    <div class="card">
      ${ASSETS.filter(a=>G.portfolio[a.id]>0).map(a=>`
        <div class="portfolio-entry">
          <span>${a.name}</span>
          <span style="color:var(--green)">${fmtMoney(G.portfolio[a.id]*G.assetPrices[a.id])}</span>
        </div>
      `).join('') || '<div style="color:var(--text-muted);font-size:11px">No investments held.</div>'}
    </div>
  `;
}

function renderRelations() {
  const panel = document.getElementById('relations-panel');
  if(G.npcs.length === 0) {
    panel.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:10px">No relationships yet.</div>';
    return;
  }
  panel.innerHTML = G.npcs.filter(n=>n.alive).map(npc => {
    const relColor = npc.relationship >= 70 ? 'var(--green)' : npc.relationship >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="npc-card">
      <div class="npc-header">
        <div class="npc-avatar">${npc.emoji}</div>
        <div>
          <div class="npc-name">${npc.name}</div>
          <div class="npc-relation">${npc.relation} · Age ${npc.age}</div>
        </div>
      </div>
      ${renderStatRow('Relationship', npc.relationship)}
      ${renderStatRow('Trust', npc.trust)}
      <div class="npc-actions">
        <button class="npc-act" onclick="npcInteract('${npc.id}','talk')">💬 Talk (15AP)</button>
        <button class="npc-act" onclick="npcInteract('${npc.id}','gift')">🎁 Gift (20AP,$200)</button>
        <button class="npc-act" onclick="npcInteract('${npc.id}','ask_money')">💸 Ask Loan</button>
        ${npc.relation==='Partner'||npc.relation==='Spouse'?`<button class="npc-act" onclick="npcInteract('${npc.id}','breakup')" style="color:var(--red)">💔 Break Up</button>`:''}
      </div>
    </div>`;
  }).join('') + G.npcs.filter(n=>!n.alive).map(npc =>
    `<div style="padding:6px;font-size:11px;color:var(--text-muted);text-decoration:line-through">${npc.emoji} ${npc.name} (${npc.relation}) — Deceased</div>`
  ).join('');
}

function npcInteract(npcId, action) {
  const npc = G.npcs.find(n=>n.id===npcId);
  if(!npc) return;
  if(action === 'talk') {
    if(G.ap < 15) { addLog('Not enough AP.','warn'); return; }
    useAP(15);
    npc.relationship = clamp(npc.relationship + 5 + rng(5), 0, 100);
    npc.trust = clamp(npc.trust + 3, 0, 100);
    addLog(`You had a good conversation with <b>${npc.name}</b>. Relationship +5.`, 'success');
  } else if(action === 'gift') {
    if(G.ap < 20 || G.cash < 200) { addLog('Not enough AP or cash.','warn'); return; }
    useAP(20); G.cash -= 200;
    npc.relationship = clamp(npc.relationship + 10 + rng(8), 0, 100);
    npc.trust = clamp(npc.trust + 5, 0, 100);
    addLog(`You gave a gift to <b>${npc.name}</b>. Relationship +10.`, 'success');
  } else if(action === 'ask_money') {
    const ask = rng(2000) + 500;
    if(npc.trust < 40) { addLog(`${npc.name} doesn't trust you enough to lend money.`,'warn'); return; }
    const chance = npc.trust / 100 * npc.relationship / 100;
    if(Math.random() < chance) {
      G.cash += ask;
      npc.dependency = clamp(npc.dependency + 20, 0, 100);
      npc.trust = clamp(npc.trust - 10, 0, 100);
      addLog(`<b>${npc.name}</b> lent you ${fmtMoney(ask)}. Their trust decreased.`, 'warn');
    } else {
      addLog(`<b>${npc.name}</b> refused to lend you money.`, 'warn');
    }
  } else if(action === 'breakup') {
    addLog(`💔 You ended things with <b>${npc.name}</b>.`, 'danger');
    npc.relation = 'Ex';
    modStat('sanity', -10); modStress(15);
  }
  renderAll();
}

function renderCareer() {
  const panel = document.getElementById('career-panel');
  const job = JOBS.find(j=>j.id===G.job);
  const nextJobs = JOBS.filter(j =>
    j.id !== 'none' && j.id !== G.job &&
    G.age >= j.minAge && G.smarts >= j.minSmarts && G.education >= j.minEdu &&
    j.baseSalary > (G.salary || 0)
  ).slice(0,3);

  panel.innerHTML = `
    <div class="section-hdr">Current Job</div>
    <div class="card">
      <div class="fin-row"><span class="fin-label">Title</span><span class="fin-val">${job ? job.title : 'Unemployed'}</span></div>
      <div class="fin-row"><span class="fin-label">Salary/yr</span><span class="fin-val pos">${fmtMoney(G.salary)}</span></div>
      <div class="fin-row"><span class="fin-label">Performance</span><span class="fin-val" style="color:${statBarColor(G.jobPerformance)}">${G.jobPerformance}/100</span></div>
      <div class="fin-row"><span class="fin-label">Quarters Held</span><span class="fin-val">${G.jobQuartersHeld}</span></div>
    </div>
    ${G.inSchool ? `
    <div class="section-hdr">School Progress</div>
    <div class="card">
      <div class="fin-row"><span class="fin-label">Program</span><span class="fin-val">${G.schoolType}</span></div>
      <div class="fin-row"><span class="fin-label">GPA</span><span class="fin-val" style="color:${statBarColor(G.gpa)}">${G.gpa.toFixed(0)}/100</span></div>
      <div class="fin-row"><span class="fin-label">Total Debt</span><span class="fin-val neg">${fmtMoney(G.schoolDebt)}</span></div>
    </div>` : ''}
    <div class="section-hdr">Career Unlocks</div>
    <div class="card">
      ${nextJobs.length ? nextJobs.map(j=>`
        <div class="fin-row">
          <span class="fin-label">${j.title}</span>
          <span class="fin-val pos">${fmtMoney(j.baseSalary)}</span>
        </div>
        <div style="font-size:9px;color:var(--text-muted);padding-bottom:4px">Req: Age ${j.minAge}, Smarts ${j.minSmarts}, Edu Lvl ${j.minEdu}</div>
      `).join('') : '<div style="color:var(--text-muted);font-size:11px">No better jobs available yet.</div>'}
    </div>
  `;
  if(G.job !== 'none') G.jobQuartersHeld++;
}

function renderSidebarRight() {
  // Character profile
  document.getElementById('char-profile').innerHTML = `
    <div style="font-size:18px;text-align:center;margin-bottom:4px;">${G.gender === 'Male' ? '👨' : '👩'}</div>
    <div style="text-align:center;font-weight:700;font-size:14px;">${G.name}</div>
    <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:8px;">${getLifeStage()} · ${G.gender}</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;">
      ${G.inPrison?'<span class="badge badge-red">🔒 Prison</span>':''}
      ${G.inSchool?'<span class="badge badge-blue">📚 Student</span>':''}
      ${G.company?'<span class="badge badge-purple">🏢 Founder</span>':''}
      ${G.npcs.find(n=>n.relation==='Spouse')?'<span class="badge badge-green">💍 Married</span>':''}
      ${G.npcs.find(n=>n.relation==='Child')?'<span class="badge badge-yellow">👶 Parent</span>':''}
      ${G.hasPrenup?'<span class="badge badge-blue">📜 Prenup</span>':''}
      ${G.criminalRecord>0?`<span class="badge badge-red">🚔 Criminal x${G.criminalRecord}</span>`:''}
    </div>
  `;

  // Active events
  const eventsHtml = [
    G.pandemicActive ? '<div style="font-size:11px;padding:3px 0;color:var(--orange)">🦠 Pandemic (<span style="color:var(--text-muted)">' + G.pandemicQuarters + ' qtrs left)</span></div>' : '',
    G.warActive ? '<div style="font-size:11px;padding:3px 0;color:var(--red)">⚔️ Armed Conflict</div>' : '',
    G.economy !== 'normal' ? `<div style="font-size:11px;padding:3px 0;color:${G.economy==='boom'?'var(--green)':'var(--red)'}">📊 ${G.economy === 'boom' ? 'Economic Boom' : 'Recession'}</div>` : '',
    ...G.diseases.map(d=>{const def=DISEASES.find(x=>x.id===d.id);return def?`<div style="font-size:11px;padding:3px 0;color:var(--red)">⚕ ${def.name} (${d.remaining} qtrs)</div>`:'';}),
    G.burnoutStacks > 0 ? `<div style="font-size:11px;padding:3px 0;color:var(--yellow)">🔥 Burnout Stack: ${G.burnoutStacks}/2</div>` : '',
  ].filter(Boolean).join('');
  document.getElementById('active-events').innerHTML = eventsHtml || '<div style="font-size:11px;color:var(--text-muted)">No active events.</div>';

  // World state
  document.getElementById('world-state').innerHTML = `
    <div class="fin-row"><span class="fin-label">Economy</span><span class="fin-val" style="color:${G.economy==='boom'?'var(--green)':G.economy==='recession'?'var(--red)':'var(--text-primary)'}">${G.economy}</span></div>
    <div class="fin-row"><span class="fin-label">Inflation</span><span class="fin-val" style="color:var(--yellow)">${(G.inflationRate*100).toFixed(1)}%/yr</span></div>
    <div class="fin-row"><span class="fin-label">AP Available</span><span class="fin-val ${G.ap<30?'neg':''}">${G.ap} / ${G.maxAP}</span></div>
  `;

  // Debt panel
  const totalDebt = G.debts.reduce((s,d)=>s+d.amount,0);
  document.getElementById('debt-panel').innerHTML = G.debts.length > 0 ?
    G.debts.map(d=>`<div class="fin-row"><span class="fin-label" style="font-size:10px">${d.name}</span><span class="fin-val neg" style="font-size:11px">${fmtMoney(d.amount)}</span></div>`).join('') +
    `<div style="margin-top:4px;font-size:11px;color:var(--red);font-weight:600">Total: ${fmtMoney(totalDebt)}</div>`
    : '<div style="font-size:11px;color:var(--green)">Debt-free! 🎉</div>';

  // Business panel
  if(G.company) {
    const co = G.company;
    document.getElementById('business-panel').innerHTML = `
      <div style="font-weight:600;font-size:12px;margin-bottom:6px;">${co.name}</div>
      <div class="company-row"><span>Employees</span><span>${co.employees}</span></div>
      <div class="company-row"><span>Salary/emp/qtr</span><span>${fmtMoney(co.employeeSalary)}</span></div>
      <div class="company-row"><span>Marketing/qtr</span><span>${fmtMoney(co.marketing)}</span></div>
      <div class="company-row"><span>Product Price</span><span>${fmtMoney(co.price)}</span></div>
      <div class="company-row"><span>Last Revenue</span><span style="color:var(--green)">${fmtMoney(co.revenue||0)}</span></div>
      <div class="company-row"><span>Last Profit</span><span style="color:${(co.profit||0)>=0?'var(--green)':'var(--red)'}">${fmtMoney(co.profit||0)}</span></div>
      <div class="company-row"><span>Neg. CF Qtrs</span><span style="color:${co.cashflowNeg>0?'var(--red)':'var(--green)'}">  ${co.cashflowNeg}/2</span></div>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
        <button onclick="bizAction('hire')" class="act-btn" style="font-size:10px;padding:4px 8px;">+ Hire Employee ($5K/qtr)</button>
        <button onclick="bizAction('fire')" class="act-btn" style="font-size:10px;padding:4px 8px;" ${co.employees<=1?'disabled':''}>- Fire Employee</button>
        <button onclick="bizAction('marketing')" class="act-btn" style="font-size:10px;padding:4px 8px;">Boost Marketing (+$2K)</button>
        <button onclick="bizAction('close')" class="act-btn" style="font-size:10px;padding:4px 8px;color:var(--red);">🗑 Close Business</button>
      </div>
    `;
  } else {
    document.getElementById('business-panel').innerHTML = '<div style="font-size:11px;color:var(--text-muted)">No business. Start one from Activities.</div>';
  }

  // Property panel
  document.getElementById('property-panel').innerHTML = G.properties.length > 0 ?
    G.properties.map(p=>`
      <div style="font-size:11px;padding:4px 0;">
        <div style="font-weight:600">${p.name}</div>
        <div style="color:var(--green)">${fmtMoney(p.value)}</div>
        ${p.mortgage?`<div style="color:var(--red)">Mortgage: ${fmtMoney(p.mortgage)}/qtr</div>`:''}
      </div>
    `).join('') : '<div style="font-size:11px;color:var(--text-muted)">No properties owned.</div>';
}

function bizAction(action) {
  if(!G.company) return;
  const co = G.company;
  if(action === 'hire') {
    co.employees++;
    addLog(`Hired a new employee. Monthly payroll increases.`, 'info');
  } else if(action === 'fire') {
    if(co.employees > 1) { co.employees--; addLog(`Fired an employee. Payroll reduced.`, 'warn'); }
  } else if(action === 'marketing') {
    if(G.cash >= 2000) { G.cash -= 2000; co.marketing += 2000; addLog(`Boosted marketing budget by $2,000.`, 'info'); }
    else { addLog(`Insufficient cash for marketing boost.`, 'warn'); }
  } else if(action === 'close') {
    addLog(`🏢 Closed <b>${co.name}</b>. Business operations ceased.`, 'warn');
    G.company = null;
  }
  renderAll();
}

function renderTicker() {
  const items = ASSETS.map(a => {
    const price = G.assetPrices[a.id];
    const hist = G.assetHistory[a.id];
    const prev = hist.length >= 2 ? hist[hist.length-2] : price;
    const change = ((price-prev)/prev)*100;
    const dir = change >= 0 ? 'up' : 'dn';
    const arrow = change >= 0 ? '▲' : '▼';
    return `<span class="ticker-item">${a.name.split('(')[1].replace(')','')} <span class="${dir}">${arrow}${Math.abs(change).toFixed(2)}%</span></span>`;
  });
  document.getElementById('ticker').innerHTML = [...items, ...items].join(' &nbsp;·&nbsp; ');
}

function switchTab(tab) {
  ['status','activities','finance','invest','relations','career'].forEach(t => {
    document.getElementById(`content-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
}

// ============================================================
// START THE GAME
// ============================================================
initGame();
</script>
</body>
</html>
