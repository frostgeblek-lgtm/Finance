<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeForge — Complex Life Simulator</title>
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg-base: #0a0c0f;
  --bg-panel: #10141a;
  --bg-card: #161c24;
  --bg-hover: #1e2632;
  --border: #1e2a38;
  --border-bright: #2a3a52;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --accent2: #8b5cf6;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --cyan: #06b6d4;
  --text-primary: #e2e8f0;
  --text-secondary: #7a8fa8;
  --text-muted: #4a5e72;
  --font-mono: 'Courier New', monospace;
  --font-ui: system-ui, -apple-system, sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font-ui); background: var(--bg-base); color: var(--text-primary); font-size: 13px; overflow: hidden; }

/* ===== LAYOUT ===== */
#app { display: flex; flex-direction: column; height: 100vh; }
#header { background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 10; }
#main { display: flex; flex: 1; overflow: hidden; }
#sidebar-left { width: 240px; flex-shrink: 0; background: var(--bg-panel); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
#center { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
#sidebar-right { width: 260px; flex-shrink: 0; background: var(--bg-panel); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }

/* ===== HEADER ELEMENTS ===== */
.hdr-logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.hdr-logo span { color: var(--accent2); }
.hdr-stat { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
.hdr-stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.hdr-stat-val { font-weight: 600; font-size: 14px; }
.hdr-sep { flex: 1; }
.hdr-notif { flex: 0 0 340px; font-size: 11px; color: var(--text-secondary); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#btn-age { padding: 6px 20px; background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; font-size: 13px; transition: opacity .2s; letter-spacing: 0.3px; }
#btn-age:hover { opacity: 0.85; }
#btn-age:disabled { opacity: 0.4; cursor: default; }

/* ===== SIDEBAR LEFT — TABS ===== */
.tab-list { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); }
.tab-btn { padding: 10px 14px; cursor: pointer; border: none; background: none; color: var(--text-secondary); text-align: left; font-size: 12px; font-weight: 500; transition: all .15s; display: flex; align-items: center; gap: 8px; }
.tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tab-btn.active { background: var(--accent-glow); color: var(--accent); border-right: 2px solid var(--accent); }
.tab-icon { width: 16px; text-align: center; }
.tab-content { display: none; flex-direction: column; gap: 1px; padding: 8px; flex: 1; overflow-y: auto; }
.tab-content.active { display: flex; }

/* ===== CARDS & PANELS ===== */
.panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; }
.panel-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 6px; }
.card:last-child { margin-bottom: 0; }

/* ===== STAT BARS ===== */
.stat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.stat-label { width: 70px; font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
.stat-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.stat-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }
.stat-val { width: 30px; text-align: right; font-size: 11px; font-weight: 600; color: var(--text-primary); flex-shrink: 0; }

/* ===== ACTION BUTTONS ===== */
.act-btn { width: 100%; padding: 8px 10px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; color: var(--text-primary); text-align: left; transition: all .15s; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.act-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-glow); }
.act-btn:disabled { opacity: 0.4; cursor: default; }
.act-btn-name { font-size: 12px; font-weight: 500; }
.act-btn-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.act-btn-cost { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.cost-ap { font-size: 10px; color: var(--cyan); font-weight: 600; }
.cost-money { font-size: 10px; color: var(--yellow); }

/* ===== LOG FEED ===== */
#log-feed { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; min-height: 300px; }
.log-entry { padding: 8px 10px; border-radius: var(--radius); border-left: 3px solid transparent; font-size: 12px; line-height: 1.5; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.log-info { border-left-color: var(--accent); background: rgba(59,130,246,0.06); }
.log-warn { border-left-color: var(--yellow); background: rgba(234,179,8,0.06); }
.log-danger { border-left-color: var(--red); background: rgba(239,68,68,0.08); }
.log-success { border-left-color: var(--green); background: rgba(34,197,94,0.06); }
.log-event { border-left-color: var(--accent2); background: rgba(139,92,246,0.08); }
.log-time { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
.log-text { color: var(--text-primary); }

/* ===== DIALOG / CHOICE ===== */
#dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; }
#dialog-overlay.active { display: flex; }
#dialog-box { background: var(--bg-panel); border: 1px solid var(--border-bright); border-radius: var(--radius-lg); padding: 20px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
.dialog-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.dialog-subtitle { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }
.dialog-body { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
.dialog-choices { display: flex; flex-direction: column; gap: 6px; }
.dialog-choice { padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; color: var(--text-primary); font-size: 12px; text-align: left; transition: all .15s; }
.dialog-choice:hover { border-color: var(--accent); background: var(--accent-glow); }
.dialog-choice-cost { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

/* ===== NPC LIST ===== */
.npc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 6px; }
.npc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.npc-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.npc-name { font-size: 12px; font-weight: 600; }
.npc-relation { font-size: 10px; color: var(--text-muted); }
.npc-actions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.npc-act { padding: 3px 8px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 10px; color: var(--text-secondary); transition: all .15s; }
.npc-act:hover { border-color: var(--accent); color: var(--accent); }

/* ===== FINANCIAL PANEL ===== */
.fin-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.fin-row:last-child { border-bottom: none; }
.fin-label { color: var(--text-secondary); }
.fin-val { font-weight: 600; }
.fin-val.pos { color: var(--green); }
.fin-val.neg { color: var(--red); }
.fin-val.neu { color: var(--text-primary); }

/* ===== INVESTMENT ROW ===== */
.inv-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--bg-hover); border-radius: var(--radius); margin-bottom: 4px; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
.inv-row:hover { border-color: var(--accent); }
.inv-name { flex: 1; font-size: 11px; font-weight: 500; }
.inv-price { font-size: 11px; font-weight: 600; }
.inv-change { font-size: 10px; width: 50px; text-align: right; }
.inv-change.up { color: var(--green); }
.inv-change.dn { color: var(--red); }
.inv-owned { font-size: 10px; color: var(--text-muted); width: 60px; text-align: right; }

/* ===== MINI BADGES ===== */
.badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 99px; font-size: 10px; font-weight: 600; gap: 3px; }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
.badge-purple { background: rgba(139,92,246,0.15); color: var(--accent2); }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }

/* ===== TRAITS PANEL ===== */
.trait-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; margin: 2px; border: 1px solid var(--border); background: var(--bg-hover); color: var(--text-secondary); }

/* ===== SCROLLBARS ===== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ===== PROGRESS RING ===== */
.ap-ring { position: relative; width: 36px; height: 36px; }
.ap-ring svg { transform: rotate(-90deg); }
.ap-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--cyan); }

/* ===== GAME OVER ===== */
#gameover { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; }
#gameover.active { display: flex; }
.go-title { font-size: 32px; font-weight: 900; color: var(--red); letter-spacing: -1px; }
.go-sub { font-size: 16px; color: var(--text-secondary); }
.go-stats { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; max-width: 400px; width: 90%; }
.go-stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.go-restart { padding: 12px 32px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }

/* ===== RESPONSIVE CLAMP ===== */
@media (max-width: 900px) { #sidebar-right { display: none; } }
@media (max-width: 600px) { #sidebar-left { width: 180px; } }

/* Section headers in left panel */
.section-hdr { padding: 8px 8px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; }

/* Tooltip */
[title] { cursor: help; }

/* Trait positive/negative coloring */
.trait-pos { border-color: rgba(34,197,94,0.3); color: var(--green); }
.trait-neg { border-color: rgba(239,68,68,0.3); color: var(--red); }
.trait-neu { border-color: rgba(59,130,246,0.3); color: var(--accent); }

/* AP bar highlight */
.ap-low { color: var(--red) !important; }
.ap-med { color: var(--yellow) !important; }
.ap-ok { color: var(--cyan) !important; }

/* Company panel */
.company-row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; }
.company-row span:first-child { color: var(--text-muted); }

/* Stock portfolio mini */
.portfolio-entry { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.portfolio-entry:last-child { border-bottom: none; }

/* Input fields */
.sim-input { background: var(--bg-hover); border: 1px solid var(--border); color: var(--text-primary); padding: 5px 8px; border-radius: var(--radius); font-size: 12px; width: 100%; }
.sim-input:focus { outline: none; border-color: var(--accent); }

/* Two-col layout inside panels */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

/* Prison indicator */
.prison-bar { background: repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(239,68,68,0.1) 5px, rgba(239,68,68,0.1) 10px); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 8px; color: var(--red); font-size: 11px; text-align: center; margin-bottom: 8px; }

/* Ticker animation */
@keyframes tickerMove { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
.ticker-wrap { overflow: hidden; flex: 1; }
.ticker-inner { display: flex; gap: 20px; animation: tickerMove 20s linear infinite; white-space: nowrap; font-size: 11px; }
.ticker-item { color: var(--text-muted); }
.ticker-item .up { color: var(--green); }
.ticker-item .dn { color: var(--red); }
</style>
</head>
<body>

<!-- GAME OVER SCREEN -->
<div id="gameover">
  <div class="go-title">☠ GAME OVER</div>
  <div class="go-sub" id="go-cause">You have passed away.</div>
  <div class="go-stats" id="go-stats"></div>
  <button class="go-restart" onclick="initGame()">Start New Life</button>
</div>

<!-- DIALOG OVERLAY -->
<div id="dialog-overlay">
  <div id="dialog-box">
    <div class="dialog-title" id="dlg-title"></div>
    <div class="dialog-subtitle" id="dlg-sub"></div>
    <div class="dialog-body" id="dlg-body"></div>
    <div class="dialog-choices" id="dlg-choices"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="hdr-logo">Life<span>Forge</span></div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">Age</span>
      <span class="hdr-stat-val" id="hdr-age">0</span>
    </div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">Quarter</span>
      <span class="hdr-stat-val" id="hdr-quarter">Q1</span>
    </div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">AP</span>
      <span class="hdr-stat-val" id="hdr-ap" style="color:var(--cyan)">100</span>
    </div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">Cash</span>
      <span class="hdr-stat-val" id="hdr-money" style="color:var(--green)">$0</span>
    </div>
    <div class="hdr-stat">
      <span class="hdr-stat-label">Net Worth</span>
      <span class="hdr-stat-val" id="hdr-nw" style="color:var(--yellow)">$0</span>
    </div>
    <div class="hdr-sep"></div>
    <!-- TICKER -->
    <div class="ticker-wrap" id="ticker-wrap">
      <div class="ticker-inner" id="ticker">Loading market data...</div>
    </div>
    <div class="hdr-sep" style="max-width:12px"></div>
    <button id="btn-age" onclick="advanceQuarter()">▶ Next Quarter</button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- SIDEBAR LEFT -->
    <div id="sidebar-left">
      <div class="tab-list">
        <button class="tab-btn active" onclick="switchTab('status')" id="tab-status">
          <span class="tab-icon">📊</span> Status
        </button>
        <button class="tab-btn" onclick="switchTab('activities')" id="tab-activities">
          <span class="tab-icon">⚡</span> Activities
        </button>
        <button class="tab-btn" onclick="switchTab('finance')" id="tab-finance">
          <span class="tab-icon">💰</span> Finance
        </button>
        <button class="tab-btn" onclick="switchTab('invest')" id="tab-invest">
          <span class="tab-icon">📈</span> Market
        </button>
        <button class="tab-btn" onclick="switchTab('relations')" id="tab-relations">
          <span class="tab-icon">❤️</span> Relations
        </button>
        <button class="tab-btn" onclick="switchTab('career')" id="tab-career">
          <span class="tab-icon">💼</span> Career
        </button>
      </div>

      <!-- TAB: STATUS -->
      <div class="tab-content active" id="content-status">
        <div class="section-hdr">Physical</div>
        <div id="stats-physical"></div>
        <div class="section-hdr">Mental</div>
        <div id="stats-mental"></div>
        <div class="section-hdr">Social</div>
        <div id="stats-social"></div>
        <div class="section-hdr">Traits</div>
        <div id="traits-panel" style="padding:4px 0;"></div>
        <div class="section-hdr" style="margin-top:6px;">Life Stage</div>
        <div id="life-stage-info" style="padding:4px 8px;font-size:11px;color:var(--text-secondary);"></div>
      </div>

      <!-- TAB: ACTIVITIES -->
      <div class="tab-content" id="content-activities">
        <div id="prison-notice" style="display:none" class="prison-bar">🔒 INCARCERATED<br><span id="prison-time"></span></div>
        <div id="activities-list"></div>
      </div>

      <!-- TAB: FINANCE -->
      <div class="tab-content" id="content-finance">
        <div id="finance-panel"></div>
      </div>

      <!-- TAB: MARKET -->
      <div class="tab-content" id="content-invest">
        <div id="market-panel"></div>
      </div>

      <!-- TAB: RELATIONS -->
      <div class="tab-content" id="content-relations">
        <div id="relations-panel"></div>
      </div>

      <!-- TAB: CAREER -->
      <div class="tab-content" id="content-career">
        <div id="career-panel"></div>
      </div>
    </div>

    <!-- CENTER: LOG FEED -->
    <div id="center">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;">LIFE LOG — REAL-TIME EVENTS</div>
        <button onclick="clearLog()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:10px;">Clear</button>
      </div>
      <div id="log-feed"></div>
    </div>

    <!-- SIDEBAR RIGHT -->
    <div id="sidebar-right">
      <div style="padding:10px 10px 4px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">Character</div>
      <div style="padding:4px 10px 10px;" id="char-profile"></div>

      <div style="padding:4px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">Active Events</div>
      <div id="active-events" style="padding:4px 10px;"></div>

      <div style="padding:4px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">World State</div>
      <div id="world-state" style="padding:4px 10px 10px;"></div>

      <div style="padding:4px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">Debt Tracker</div>
      <div id="debt-panel" style="padding:4px 10px 10px;"></div>

      <div style="padding:4px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">Business</div>
      <div id="business-panel" style="padding:4px 10px 10px;"></div>

      <div style="padding:4px 10px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-weight:700;">Property</div>
      <div id="property-panel" style="padding:4px 10px 10px;"></div>
    </div>
  </div>
</div>

<script>
'use strict';
// ============================================================
// STATE MANAGEMENT — Single source of truth
// ============================================================
let G = {}; // Global game state
let dialogQueue = []; // Queue of pending dialogs
let dialogActive = false;

// ============================================================
// CONSTANTS
// ============================================================
const TRAITS = [
  { id:'genius', name:'🧠 Genius', desc:'Learning costs 50% less AP', type:'pos' },
  { id:'addictive', name:'🎲 Addictive Personality', desc:'Harmful habits hard to resist; stress relief addictions', type:'neg' },
  { id:'anxious', name:'😰 Anxious', desc:'Stress rises 20% faster from all sources', type:'neg' },
  { id:'charismatic', name:'✨ Born Charismatic', desc:'+15 base Charisma; socializing costs less AP', type:'pos' },
  { id:'iron_gut', name:'💪 Iron Constitution', desc:'Immune System degrades 50% slower', type:'pos' },
  { id:'glutton', name:'🍔 Glutton', desc:'Appearance degrades without gym; health risks', type:'neg' },
  { id:'hustler', name:'🏃 Hustler', desc:'+10% salary; faster career growth', type:'pos' },
  { id:'unlucky', name:'🙁 Unlucky', desc:'Negative events 25% more likely', type:'neg' },
  { id:'lucky', name:'🍀 Lucky', desc:'Positive events 25% more likely', type:'pos' },

function initGame() {
  const names = ['Alex','Jordan','Taylor','Morgan','Riley','Casey','Jamie','Drew'];
  const name = names[rng(names.length)];
  const gender = Math.random() > 0.5 ? 'Male' : 'Female';

  // Pick 2-3 random traits at birth
  const shuffled = [...TRAITS].sort(()=>Math.random()-0.5);
  const birthTraits = shuffled.slice(0, 2 + (Math.random()<0.3?1:0));

  // Init assets with current prices
  const portfolio = {};
  const prices = {};
  ASSETS.forEach(a => { prices[a.id] = a.basePrice; portfolio[a.id] = 0; });

  G = {
    // Time
    age: 0, quarter: 1, totalQuarters: 0,
    // AP
    ap: 100, maxAP: 100, burnoutStacks: 0,
    // Character
    name, gender,
    traits: birthTraits.map(t=>t.id),
    // Physical stats 0-100
    health: 80 + rng(20),
    appearance: 50 + rng(50),
    stamina: 60 + rng(40),
    immune: 70 + rng(30),
    // Mental stats
    smarts: 30 + rng(40),
    sanity: 80 + rng(20),
    stress: 10 + rng(20),
    focus: 60 + rng(40),
    // Social
    reputation: 30 + rng(20),
    charisma: 30 + rng(40),
    karma: 50,
    // Finance
    cash: 0, netWorth: 0, creditScore: 650,
    income: 0, expenses: 0, // quarterly
    salary: 0,
    job: 'none', jobLevel: 0, jobPerformance: 50,
    jobQuartersHeld: 0,
    education: 0, // 0=none,1=HS,2=bachelor,3=master
    gpa: 0, inSchool: false, schoolType: null, schoolDebt: 0,
    // Debts array: {id, name, amount, rate, minPayment}
    debts: [],
    // Properties array: {id, name, value, rent, mortgage}
    properties: [],
    // Company: null or { name, capital, employees, salary, marketing, price, revenue, cashflowNeg }
    company: null,
    // Investments
    portfolio,
    assetPrices: prices,
    assetHistory: ASSETS.reduce((o,a)=>({...o,[a.id]:[a.basePrice]}),{}),
    // NPCs
    npcs: [],
    // Active conditions
    diseases: [],
    inPrison: false, prisonQuarters: 0,
    // World state
    economy: 'normal', // normal/recession/boom
    inflation: 1.0, // cumulative multiplier
    inflationRate: 0.02 + Math.random()*0.02, // 2-4% annual
    pandemicActive: false, pandemicQuarters: 0,
    warActive: false,
    // Events
    activeEvents: [],
    // History for game-over
    history: { quartersLived: 0, peakNetWorth: 0, causeDeath: '', achievements: [] },
    // Criminal record
    criminalRecord: 0,
    arrested: false,
    // Misc flags
    hasPrenup: false,
    bankruptcyCount: 0,
    consecutiveBurnoutQtrs: 0,
    lastAPused: 0,
  };

  // Apply trait effects at birth
  if(hasTrait('charismatic')) G.charisma = Math.min(100, G.charisma+15);
  if(hasTrait('photogenic')) G.appearance = Math.min(100, G.appearance+20);

  // Generate starting family NPCs
  G.npcs.push(createNPC('Mom', 'Parent', '👩', 45));
  G.npcs.push(createNPC('Dad', 'Parent', '👨', 47));

  // Reset UI
  document.getElementById('gameover').classList.remove('active');
  clearLog();
  renderAll();
  addLog(`A new life begins. Meet <b>${name}</b>, born ${gender === 'Male' ? 'as a boy' : 'as a girl'} into the world.`, 'info');
  addLog(`Personality traits detected: <b>${birthTraits.map(t=>t.name).join(', ')}</b>`, 'event');
  addLog(`Welcome to LifeForge — a ruthlessly realistic life simulator. Every choice costs Action Points. Choose wisely.`, 'info');
}

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function rng(n) { return Math.floor(Math.random() * n); }
function rngFloat(min,max) { return min + Math.random()*(max-min); }
function clamp(v,mn,mx) { return Math.max(mn, Math.min(mx, v)); }
function hasTrait(id) { return G.traits.includes(id); }
function fmtMoney(n) {
  if(Math.abs(n)>=1e6) return `$${(n/1e6).toFixed(2)}M`;
  if(Math.abs(n)>=1e3) return `$${(n/1e3).toFixed(1)}K`;
  return `$${n.toFixed(0)}`;
}
function fmtAge() { return `${G.age}y Q${G.quarter}`; }
function stressMultiplier() { return hasTrait('anxious') ? 1.2 : 1.0; }

function addLog(msg, type='info') {
  const feed = document.getElementById('log-feed');
  const el = document.createElement('div');
  el.className = `log-entry log-${type}`;
  el.innerHTML = `<div class="log-time">${fmtAge()}</div><div class="log-text">${msg}</div>`;
  feed.appendChild(el);
  feed.scrollTop = feed.scrollHeight;
}
function clearLog() {
  document.getElementById('log-feed').innerHTML = '';
}

function createNPC(name, relation, emoji, age) {
  return {
    id: Math.random().toString(36).slice(2),
    name, relation, emoji, age,
    relationship: 60 + rng(30),
    trust: 50 + rng(30),
    dependency: 0, // financial dependency
    alive: true,
    jealousy: 0,
  };
}

function getLifeStage() {
  if(G.age < 5) return 'Infant';
  if(G.age < 13) return 'Child';
  if(G.age < 18) return 'Teenager';
  if(G.age < 25) return 'Young Adult';
  if(G.age < 40) return 'Adult';
  if(G.age < 60) return 'Middle-Aged';
  if(G.age < 80) return 'Senior';
  return 'Elder';
}

// Progressive income tax calculation
// Based on tiered US-inspired tax brackets
function calcTax(income) {
  if(income <= 10000) return income * 0.10;
  if(income <= 40000) return 1000 + (income-10000)*0.12;
  if(income <= 85000) return 4600 + (income-40000)*0.22;
  if(income <= 163000) return 14500 + (income-85000)*0.24;
  if(income <= 215000) return 33220 + (income-163000)*0.32;
  return 49900 + (income-215000)*0.37;
}

// Credit score: 300-850. Affected by: payment history, debt levels, income
function updateCreditScore(delta) {
  G.creditScore = clamp(G.creditScore + delta, 300, 850);
}

// Stat with trait and clamping
function modStat(key, delta) {
  G[key] = clamp(G[key] + delta, 0, 100);
}
function modStress(delta) {
  const effective = delta * stressMultiplier();
  G.stress = clamp(G.stress + effective, 0, 100);
}

// ============================================================
// QUARTER ADVANCE — The core game loop
// ============================================================
function advanceQuarter() {
  if(dialogActive) return;
  document.getElementById('btn-age').disabled = true;

  G.totalQuarters++;
  G.history.quartersLived = G.totalQuarters;

  // Track AP usage
  G.lastAPused = G.maxAP - G.ap;

  // ---- Age progression ----
  G.quarter++;
  if(G.quarter > 4) { G.quarter = 1; G.age++; }

  addLog(`━━━ <b>Age ${G.age}, Quarter ${G.quarter}</b> begins ━━━`, 'info');

  // ---- Refresh AP ----
  // Burnout check: if used 90%+ AP last quarter
  if(G.lastAPused >= 90 || G.stress > 80) {
    G.burnoutStacks++;
    if(G.burnoutStacks >= 2) {
      addLog(`You've been running on fumes. <b>Burnout hits!</b> -15 Health, -20 Sanity`, 'danger');
      modStat('health', -15);
      modStat('sanity', -20);
      modStress(10);
      G.burnoutStacks = 0;
    }
  } else {
    G.burnoutStacks = Math.max(0, G.burnoutStacks-1);
  }
  G.ap = G.maxAP;

  // ---- Yearly events (each Q1) ----
  if(G.quarter === 1) {
    processYearlyEvents();
  }

  // ---- Apply passive effects ----
  applyPassiveEffects();

  // ---- Economy & Financial ----
  processFinancials();

  // ---- Market fluctuations ----
  fluctuateMarkets();

  // ---- Active disease effects ----
  processDiseases();

  // ---- Prison tick ----
  if(G.inPrison) {
    G.prisonQuarters--;
    addLog(`You serve time in prison. <b>${G.prisonQuarters} quarters remaining.</b> Stress rises.`, 'danger');
    modStress(15);
    modStat('sanity', -8);
    modStat('reputation', -5);
    if(G.prisonQuarters <= 0) {
      G.inPrison = false;
      addLog(`You have been released from prison. Life must go on.`, 'warn');
      modStat('reputation', -20); // permanent rep hit
    }
  }

  // ---- NPC events ----
  processNPCEvents();

  // ---- Random world events ----
  triggerRandomEvents();

  // ---- School progress ----
  if(G.inSchool) processSchool();

  // ---- Business tick ----
  if(G.company) processBusiness();

  // ---- Aging effects ----
  applyAgingEffects();

  // ---- Net worth calculation ----
  recalcNetWorth();

  // ---- Check game-over conditions ----
  checkGameOver();

  renderAll();
  document.getElementById('btn-age').disabled = false;

  // Process any queued dialogs
  processDialogQueue();
}

// ============================================================
// PASSIVE EFFECTS PER QUARTER
// ============================================================
function applyPassiveEffects() {
  // Stamina affects health recovery
  const staminaBonus = G.stamina > 70 ? 2 : 0;
  // Stress degrades sanity and health
  if(G.stress > 70) {
    modStat('sanity', -Math.floor((G.stress-70)/10));
    modStat('health', -1);
  }
  if(G.stress > 90) {
    modStat('health', -2);
    addLog(`Chronic stress is destroying your body. Health and Sanity degrading.`, 'danger');
  }
  // Natural health recovery (from immune system)
  const immuneRec = G.inPrison ? 0 : Math.floor(G.immune/50);
  modStat('health', immuneRec + staminaBonus);
  // Immune degrades slowly with age over 40
  if(G.age > 40) modStat('immune', -Math.floor((G.age-40)/20));
  // Focus degrades with stress
  modStat('focus', G.stress > 60 ? -5 : 1);
  // Appearance natural aging
  if(G.age > 30 && !hasTrait('photogenic')) modStat('appearance', -1);
  if(G.age > 50) modStat('appearance', -1);
  // Trait: glutton → appearance loss if no exercise recently
  if(hasTrait('glutton') && rng(10)<4) {
    modStat('appearance', -2);
    modStat('health', -1);
  }
  // Trait: paranoid → sanity drain
  if(hasTrait('paranoid')) modStat('sanity', -10);
  // Sanity effects
  if(G.sanity < 20) {
    modStress(10);
    addLog(`Your mental state is deteriorating rapidly.`, 'danger');
  }
  // Pandemic
  if(G.pandemicActive) {
    modStat('health', -3);
    modStat('immune', -2);
    if(G.quarter===1) addLog(`🦠 Pandemic continues to ravage the population. Health declining.`, 'danger');
  }
}

// ============================================================
// AGING EFFECTS
// ============================================================
function applyAgingEffects() {
  const age = G.age;
  // Progressive decline
  if(age >= 60) { modStat('stamina', -2); modStat('health', -1); }
  if(age >= 70) { modStat('stamina', -2); modStat('health', -2); modStat('immune', -2); }
  if(age >= 80) { modStat('health', -3); }
  if(age >= 90) { modStat('health', -5); modStat('sanity', -3); }
  // Disease probability increases with age
  // Handled in triggerRandomEvents
}

// ============================================================
// FINANCIAL PROCESSING
// ============================================================
function processFinancials() {
  if(G.age < 16) return; // Children don't have finances yet

  // Annual inflation update each Q1
  if(G.quarter === 1) {
    G.inflation *= (1 + G.inflationRate);
    if(G.economy === 'boom') G.inflation *= 1.01;
    addLog(`💰 Inflation rate: ${(G.inflationRate*100).toFixed(1)}%. Cost of living now at <b>${(G.inflation*100).toFixed(0)}%</b> of baseline.`, 'warn');
  }

  // Calculate quarterly salary (after tax, quarterly = annual/4)
  const annualSalary = G.salary;
  const annualTax = calcTax(annualSalary);
  const quarterlyTax = annualTax / 4;
  const quarterlyNet = (annualSalary - annualTax) / 4;

  if(annualSalary > 0) {
    G.cash += quarterlyNet;
    addLog(`Paycheck received: <b>${fmtMoney(quarterlyNet)}</b> net (tax: ${fmtMoney(quarterlyTax)})`, 'success');
  }

  // Cost of living (rent / basic expenses)
  const baseCoL = 2500; // quarterly base
  const coL = baseCoL * G.inflation * (G.economy === 'recession' ? 0.95 : 1);
  // Housing costs
  let housingCost = 0;
  if(G.properties.length > 0) {
    G.properties.forEach(p => {
      if(p.mortgage > 0) {
        housingCost += p.mortgage;
      }
    });
  } else if(G.age >= 18) {
    housingCost = 800 * G.inflation; // renting
  }
  // Total expenses this quarter
  const totalExpenses = coL + housingCost;
  G.cash -= totalExpenses;
  G.expenses = totalExpenses;
  if(totalExpenses > 0) {
    addLog(`Living expenses: <b>${fmtMoney(totalExpenses)}</b> (CoL: ${fmtMoney(coL)}, Housing: ${fmtMoney(housingCost)})`, 'warn');
  }

  // Debt payments
  G.debts.forEach(d => {
    // Interest accrual (quarterly rate = annual rate / 4)
    const qRate = d.rate / 4;
    const interest = d.amount * qRate;
    d.amount += interest;
    // Minimum payment
    const payment = Math.min(d.minPayment, d.amount);
    if(G.cash >= payment) {
      G.cash -= payment;
      d.amount -= payment;
      updateCreditScore(2);
      if(d.amount <= 0) {
        addLog(`🎉 Debt "<b>${d.name}</b>" fully paid off!`, 'success');
        updateCreditScore(20);
      }
    } else {
      // Missed payment
      updateCreditScore(-25);
      modStress(8);
      addLog(`⚠️ Missed payment on <b>${d.name}</b>! Credit score damaged.`, 'danger');
    }
  });
  G.debts = G.debts.filter(d => d.amount > 0.01);

  // Homeless/broke check
  if(G.cash < -15000) {
    addLog(`💀 You are <b>severely in debt</b> with no income. Homelessness imminent.`, 'danger');
    modStat('health', -5);
    modStat('sanity', -10);
    modStress(20);
  }
  if(G.cash < -50000 && G.netWorth < -40000) {
    gameOver('Died homeless and destitute after total financial collapse.');
  }
}

// ============================================================
// MARKET FLUCTUATIONS — Weighted random walk with trends
// ============================================================
function fluctuateMarkets() {
  ASSETS.forEach(a => {
    // Trend momentum: persists a few quarters (mean-reverting random walk)
    a.trend += rngFloat(-0.2, 0.2);
    a.trend = clamp(a.trend, -0.5, 0.5);

    // Economy affects all markets
    let econMod = 0;
    if(G.economy === 'boom') econMod = 0.01;
    if(G.economy === 'recession') econMod = -0.02;

    // War affects energy stocks positively, others negatively
    if(G.warActive) {
      if(a.id === 'energy') econMod += 0.03;
      else econMod -= 0.01;
    }

    // Pandemic affects pharma positively
    if(G.pandemicActive && a.id === 'pharma') econMod += 0.04;

    // Black swan events (~2% chance per quarter per asset)
    let blackSwan = 0;
    if(Math.random() < 0.02) {
      blackSwan = rngFloat(-0.25, 0.25); // extreme move
      if(Math.abs(blackSwan) > 0.10) {
        addLog(`🦢 <b>Black swan event!</b> ${a.name} moves ${(blackSwan*100).toFixed(0)}%!`, 'event');
      }
    }

    // Final price change (normal distribution approximation via sum of randoms)
    const rawChange = (
      a.trend * 0.02 +
      rngFloat(-a.volatility, a.volatility) +
      econMod +
      blackSwan
    );

    const oldPrice = G.assetPrices[a.id];
    const newPrice = Math.max(oldPrice * (1 + rawChange), 0.01);
    G.assetPrices[a.id] = newPrice;
    G.assetHistory[a.id].push(newPrice);
    if(G.assetHistory[a.id].length > 20) G.assetHistory[a.id].shift();
  });
}

// ============================================================
// DISEASE PROCESSING
// ============================================================
function processDiseases() {
  G.diseases.forEach(d => {
    const def = DISEASES.find(x=>x.id===d.id);
    if(!def) return;
    modStat('health', -def.hpDmg);
    // Apply special effects
    if(d.id === 'diabetes') modStat('stamina', -5);
    if(d.id === 'depression') { modStat('sanity', -10); modStat('focus', -20); }
    if(d.id === 'anxiety_d') modStress(15);
    d.remaining--;
    if(d.remaining <= 0) {
      addLog(`Your <b>${def.name}</b> has run its course. Recovery complete.`, 'success');
    }
    // Quarterly medical cost
    G.cash -= def.cost / def.duration;
  });
  G.diseases = G.diseases.filter(d => d.remaining > 0);
}

// ============================================================
// SCHOOL PROCESSING
// ============================================================
function processSchool() {
  // GPA naturally degrades without study; focus and smarts help
  const naturalDecay = -2;
  const focusBonus = G.focus > 70 ? 1 : 0;
  G.gpa = clamp(G.gpa + naturalDecay + focusBonus, 0, 100);
  modStress(10); // School is stressful
  // Tuition quarterly cost
  const tuition = G.schoolType === 'bachelor' ? 5000 : (G.schoolType === 'master' ? 8000 : 0);
  if(G.cash >= tuition) {
    G.cash -= tuition;
  } else {
    // Take student loan
    const loanAmt = tuition - G.cash;
    G.cash = 0;
    addDebt('Student Loan ('+G.schoolType+')', loanAmt, 0.065, 200);
    G.schoolDebt += loanAmt;
    addLog(`Can't afford tuition. Took student loan of <b>${fmtMoney(loanAmt)}</b> at 6.5% interest.`, 'warn');
  }

  // Graduation check
  const qtrsNeeded = G.schoolType === 'bachelor' ? 16 : 8; // 4 years BA, 2 years MA
  if(!G.schoolStartQtr) G.schoolStartQtr = G.totalQuarters;
  const elapsed = G.totalQuarters - G.schoolStartQtr;
  if(elapsed >= qtrsNeeded) {
    if(G.gpa >= 40) {
      const level = G.schoolType === 'bachelor' ? 2 : 3;
      G.education = level;
      G.inSchool = false;
      const title = G.schoolType === 'bachelor' ? 'Bachelor\'s Degree' : 'Master\'s Degree';
      addLog(`🎓 <b>Graduated!</b> You earned your <b>${title}</b> with a GPA of ${G.gpa.toFixed(0)}.`, 'success');
      modStat('smarts', 10);
      modStat('reputation', 15);
      G.schoolType = null;
    } else {
      addLog(`📉 Your GPA is too low (${G.gpa.toFixed(0)}). Academic probation — one more quarter.`, 'danger');
      modStress(20);
    }
  }
}

// ============================================================
// BUSINESS PROCESSING
// ============================================================
function processBusiness() {
  const co = G.company;
  // Revenue = price × (market demand factor) × marketing effect
  // Market demand: random factor influenced by economy
  const demandBase = 100 + rng(50);
  const econMod = G.economy === 'boom' ? 1.2 : G.economy === 'recession' ? 0.7 : 1.0;
  const marketingMod = 1 + (co.marketing / 10000);
  const demand = demandBase * econMod * marketingMod;
  const revenue = co.price * demand * co.employees * 0.5;
  // Costs = employee salaries + marketing + overhead
  const costs = (co.employees * co.employeeSalary) + co.marketing + 2000;
  const profit = revenue - costs;
  co.revenue = revenue;
  co.profit = profit;
  if(profit > 0) {
    G.cash += profit * 0.75; // owner takes 75% of profit
    co.cashflowNeg = 0;
    addLog(`🏢 <b>${co.name}</b>: Revenue ${fmtMoney(revenue)}, Profit <b>${fmtMoney(profit)}</b>`, 'success');
  } else {
    co.cashflowNeg = (co.cashflowNeg||0) + 1;
    addLog(`🏢 <b>${co.name}</b>: Losses of ${fmtMoney(-profit)} this quarter. Cash flow negative (${co.cashflowNeg}/2 before bankruptcy).`, 'danger');
    if(co.cashflowNeg >= 2) {
      addLog(`💥 <b>${co.name}</b> has gone <b>bankrupt</b>! You lose all invested capital.`, 'danger');
      G.bankruptcyCount++;
      G.company = null;
      updateCreditScore(-80);
      modStat('reputation', -20);
      modStress(25);
    }
  }
}

// ============================================================
// NPC EVENTS
// ============================================================
function processNPCEvents() {
  G.npcs.forEach(npc => {
    if(!npc.alive) return;
    // Natural relationship decay without interaction
    npc.relationship = clamp(npc.relationship - 1, 0, 100);
    npc.trust = clamp(npc.trust - 0.5, 0, 100);

    // NPC random death chance (age-based)
    if(npc.age > 60) {
      const deathChance = (npc.age - 60) * 0.003;
      if(Math.random() < deathChance) {
        npc.alive = false;
        addLog(`💔 <b>${npc.name}</b> (${npc.relation}) has passed away at age ${npc.age}. You grieve deeply.`, 'danger');
        modStat('sanity', -20);
        modStress(20);
        return;
      }
    }
    npc.age++;

    // Partner infidelity chance (if low relationship)
    if(['Partner','Spouse'].includes(npc.relation) && npc.relationship < 30) {

        npc.trust = 0;

        modStat('sanity', -15);
      }

    if(npc.dependency > 50 && rng(10) < 3) {

      queueDialog({
        title: `💸 ${npc.name} Needs Money`,
        sub: `${npc.relation} · Relationship: ${npc.relationship}`,
        body: `<b>${npc.name}</b> calls you, sounding desperate. "I hate to ask, but I need ${fmtMoney(ask)}. Things have been really rough lately..."`,
        choices: [
          { label: `Give ${fmtMoney(ask)}`, cost: `Cost: ${fmtMoney(ask)}`, action: () => {
            if(G.cash >= ask) {
              G.cash -= ask;
              npc.relationship = clamp(npc.relationship+15,0,100);
              npc.trust = clamp(npc.trust+10,0,100);
              addLog(`You gave ${fmtMoney(ask)} to ${npc.name}. They are grateful.`, 'success');

            }
            addLog(`You gave ${fmtMoney(half)} to ${npc.name}. Better than nothing.`, 'info');

    // Divorce demand (spouse, low relationship + low trust)
    if(npc.relation === 'Spouse' && npc.relationship < 20 && npc.trust < 15 && !npc._divorcePending) {
      npc._divorcePending = true;
      queueDialog({
        title: `⚖️ Divorce Proceedings`,

        body: `<b>${npc.name}</b> confronts you: "This marriage is over. I'm consulting a lawyer." Without a prenuptial agreement, they are entitled to <b>50% of all marital assets</b>.`,
        choices: [
          { label: `Agree to Divorce`, action: () => {
            const split = G.hasPrenup ? 0 : G.netWorth * 0.5;
            G.cash -= split;
            addLog(`Divorced ${npc.name}. Lost ${fmtMoney(split)} in settlement. Credit score -30.`, 'danger');
            updateCreditScore(-30);
            modStat('sanity', -15);
            modStress(25);
            G.npcs = G.npcs.filter(n=>n.id!==npc.id);
          }},
          { label: `Hire Divorce Lawyer ($8,000)`, cost:'$8,000', action: () => {
            if(G.cash >= 8000) {
              G.cash -= 8000;
              const split = G.hasPrenup ? 0 : G.netWorth * 0.3; // better outcome
              G.cash -= split;
              addLog(`Lawyer negotiated settlement. Lost ${fmtMoney(split)}. Still costly.`, 'warn');
              G.npcs = G.npcs.filter(n=>n.id!==npc.id);
            } else {
              addLog(`Can't afford a lawyer. Forced into unfavorable settlement.`, 'danger');
              const split = G.netWorth * 0.55;
              G.cash -= split;
              G.npcs = G.npcs.filter(n=>n.id!==npc.id);
            }
          }},
          { label: `Try to Reconcile`, action: () => {
            npc._divorcePending = false;
            npc.relationship += 10;
            addLog(`You agreed to couples therapy. Things might improve.`, 'info');
          }},
        ]
      });
    }
  });
}

// ============================================================
// YEARLY EVENTS (each Q1)
// ============================================================
function processYearlyEvents() {
  // Salary raise or review
  if(G.salary > 0) {
    const perf = G.jobPerformance;
    if(perf > 70) {
      const raise = G.salary * rngFloat(0.02, 0.05);
      G.salary += raise;
      addLog(`📈 Annual review: <b>Excellent</b>! Salary raised by ${fmtMoney(raise)}.`, 'success');
    } else if(perf < 30) {
      const cut = G.salary * 0.05;
      G.salary -= cut;
      modStat('reputation', -5);
      addLog(`📉 Poor annual review. Salary cut by ${fmtMoney(cut)}.`, 'danger');
    } else {
      const cola = G.salary * G.inflationRate;
      G.salary += cola;
      addLog(`Annual review: Standard. Cost-of-living adjustment: +${fmtMoney(cola)}.`, 'info');
    }
    // Economy recession: potential layoff
    if(G.economy === 'recession' && Math.random() < 0.10) {
      addLog(`🏭 <b>LAYOFF!</b> The recession claims your job at <b>${getJobTitle()}</b>.`, 'danger');
      G.job = 'none'; G.salary = 0;
      modStress(30);
      modStat('reputation', -10);
    }
    // Performance drift
    G.jobPerformance = clamp(G.jobPerformance + rng(10) - 5, 0, 100);
  }

  // Economy state: random walk
  const r = Math.random();
  if(G.economy === 'normal') {
    if(r < 0.10) { G.economy = 'recession'; addLog(`📉 <b>Economic Recession</b> declared. Salaries cut 30%, layoffs imminent.`, 'danger'); }
    else if(r > 0.85) { G.economy = 'boom'; addLog(`📈 <b>Economic Boom!</b> Markets surge. Great time to invest.`, 'success'); }
  } else if(G.economy === 'recession') {
    if(r < 0.30) { G.economy = 'normal'; addLog(`📊 Economy recovering from recession.`, 'info'); }
  } else if(G.economy === 'boom') {
    if(r < 0.25) { G.economy = 'normal'; addLog(`📊 Economic boom settling down.`, 'info'); }
    else if(r < 0.30) { G.economy = 'recession'; addLog(`📉 Boom turned to <b>bust</b>! Recession begins.`, 'danger'); }
  }

  // Inflation rate fluctuation
  G.inflationRate = clamp(G.inflationRate + rngFloat(-0.005,0.005), 0.01, 0.07);

  // Pandemic (random, ~5% chance per year if not active)
  if(!G.pandemicActive && Math.random() < 0.05) {
    G.pandemicActive = true;
    G.pandemicQuarters = 8 + rng(8);
    addLog(`🦠 <b>GLOBAL PANDEMIC</b> declared! Health authorities overwhelmed. Quarantine measures in effect.`, 'danger');
  }
  if(G.pandemicActive) {
    G.pandemicQuarters--;
    if(G.pandemicQuarters <= 0) {
      G.pandemicActive = false;
      addLog(`🏥 Pandemic declared over. Life slowly returns to normal.`, 'success');
    }
  }

  // War (random ~3% per year)
  if(!G.warActive && Math.random() < 0.03) {
    G.warActive = true;
    addLog(`⚔️ <b>ARMED CONFLICT</b> erupts. Markets volatile. Inflation spikes.`, 'danger');
    G.inflationRate = Math.min(G.inflationRate + 0.02, 0.10);
  } else if(G.warActive && Math.random() < 0.20) {
    G.warActive = false;
    addLog(`🕊️ Ceasefire declared. War has ended.`, 'info');
  }
}

// ============================================================
// RANDOM EVENTS EACH QUARTER
// ============================================================
function triggerRandomEvents() {
  const age = G.age;
  const luck = hasTrait('lucky') ? 1.25 : (hasTrait('unlucky') ? 0.75 : 1.0);
  const r = Math.random() * luck;

  // Age-gated event pools
  if(age >= 16) {
    // Accident (car, work)
    if(Math.random() < 0.03) {
      const cost = rng(15000) + 2000;
      addLog(`🚗 <b>Accident!</b> You were involved in an incident. Medical/repair costs: ${fmtMoney(cost)}.`, 'danger');
      G.cash -= cost;
      modStat('health', -rng(20)-5);
      modStat('stamina', -10);
    }
  }

  // Health crisis (immune-based probability)
  const sicknessChance = (100 - G.immune) * 0.002 * (G.stress > 70 ? 1.5 : 1) * (G.age > 50 ? 1.5 : 1);
  if(Math.random() < sicknessChance && G.diseases.length < 2) {
    // Choose disease weighted by age
    let pool;
    if(age < 30) pool = ['flu', 'anxiety_d'];
    else if(age < 50) pool = ['flu', 'anxiety_d', 'depression', 'diabetes'];
    else pool = ['flu', 'diabetes', 'depression', 'heart', 'cancer', 'anxiety_d'];
    const diseaseId = pool[rng(pool.length)];
    const def = DISEASES.find(d=>d.id===diseaseId);
    if(def && !G.diseases.find(d=>d.id===diseaseId)) {
      G.diseases.push({ id:diseaseId, remaining:def.duration });
      addLog(`🏥 Diagnosed with <b>${def.name}</b>! Medical cost: ~${fmtMoney(def.cost)}. ${def.effect}`, 'danger');
      if(def.id === 'heart') modStat('health', -30); // immediate
    }
  }

  // Windfall (inheritance, lottery small win)
  if(Math.random() * luck < 0.015) {
    const amt = rng(10000) + 1000;
    addLog(`🎉 <b>Windfall!</b> Unexpected money arrives: <b>${fmtMoney(amt)}</b>.`, 'success');
    G.cash += amt;
    modStress(-5);
  }

  // Crime victim (robbery)
  if(Math.random() < 0.02 && G.reputation < 50) {
    const stolen = Math.min(G.cash * 0.1, rng(3000)+500);
    if(stolen > 0) {
      G.cash -= stolen;
      addLog(`🔫 <b>Robbed!</b> You lost ${fmtMoney(stolen)}.`, 'danger');
      modStat('sanity', -8);
    }
  }

  // Office politics event (if employed)
  if(G.job !== 'none' && G.salary > 0 && Math.random() < 0.15) {
    const events = [
      { msg: 'A colleague stole credit for your project. Performance score -10.', perf:-10, stress:10 },
      { msg: 'Your boss praised your work in front of management. Performance +15.', perf:15, stress:-5 },
      { msg: 'You were asked to work weekends without extra pay.', perf:5, stress:20 },
      { msg: 'Internal politics: a rival undermined your proposal. -10 Reputation.', perf:-5, rep:-10, stress:15 },
      { msg: 'HR issued a warning for a minor policy violation.', perf:-15, stress:20 },
    ];
    const e = events[rng(events.length)];
    addLog(`🏢 Office Event: ${e.msg}`, 'warn');
    G.jobPerformance = clamp(G.jobPerformance + (e.perf||0), 0, 100);
    modStress(e.stress||0);
    if(e.rep) modStat('reputation', e.rep);
  }
}

// ============================================================
// NET WORTH CALCULATION
// ============================================================
function recalcNetWorth() {
  let nw = G.cash;
  // Property value
  G.properties.forEach(p => nw += p.value);
  // Investment value
  ASSETS.forEach(a => {
    nw += G.portfolio[a.id] * G.assetPrices[a.id];
  });
  // Minus debts
  G.debts.forEach(d => nw -= d.amount);
  // Company value (rough)
  if(G.company) nw += G.company.capital * 0.5;
  G.netWorth = nw;
  if(nw > G.history.peakNetWorth) G.history.peakNetWorth = nw;
}

// ============================================================
// GAME OVER
// ============================================================
function checkGameOver() {
  if(G.health <= 0) {
    if(G.age < 30) gameOver('Died young from catastrophic health failure.');
    else if(G.age < 60) gameOver(`Died at age ${G.age} from deteriorating health.`);
    else gameOver(`Passed away at age ${G.age} — lived a full life.`);
    return;
  }
  if(G.sanity <= 0) {
    gameOver('Lost all grip on reality. Committed to a psychiatric institution and never recovered.');
    return;
  }
  if(G.age >= 95) {
    gameOver(`Passed away peacefully at the remarkable age of ${G.age}.`);
    return;
  }
}

function gameOver(cause) {
  G.history.causeDeath = cause;
  document.getElementById('go-cause').textContent = cause;
  const ach = G.history.achievements;
  let statsHtml = `

    <div class="go-stat-row"><span>Age at Death</span><span>${G.age} years</span></div>

    <div class="go-stat-row"><span>Final Cash</span><span>${fmtMoney(G.cash)}</span></div>

    <div class="go-stat-row"><span>Quarters Lived</span><span>${G.history.quartersLived}</span></div>
    <div class="go-stat-row"><span>Cause of Death</span><span style="color:var(--red)">${cause}</span></div>
  `;
  document.getElementById('go-stats').innerHTML = statsHtml;
  document.getElementById('gameover').classList.add('active');
}

// ============================================================
// DIALOG SYSTEM
// ============================================================
function queueDialog(dlg) {
  dialogQueue.push(dlg);
}

function processDialogQueue() {
  if(dialogQueue.length === 0 || dialogActive) return;
  const dlg = dialogQueue.shift();
  showDialog(dlg);
}

function showDialog(dlg) {
  dialogActive = true;
  document.getElementById('dlg-title').textContent = dlg.title;
  document.getElementById('dlg-sub').textContent = dlg.sub||'';
  document.getElementById('dlg-body').innerHTML = dlg.body||'';
  const choicesEl = document.getElementById('dlg-choices');
  choicesEl.innerHTML = '';
  dlg.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'dialog-choice';
    btn.innerHTML = `<div>${c.label}</div>${c.cost?`<div class="dialog-choice-cost">${c.cost}</div>`:''}`;
    btn.onclick = () => {
      closeDialog();
      if(c.action) c.action();
      renderAll();
      setTimeout(processDialogQueue, 300);
    };
    choicesEl.appendChild(btn);
  });
  document.getElementById('dialog-overlay').classList.add('active');
}

function closeDialog() {
  dialogActive = false;
  document.getElementById('dialog-overlay').classList.remove('active');
}

  if(G.npcs.find(n=>n.relation==='Partner') && age >= 20) {
    acts.push({ id:'propose', name:'Propose Marriage', desc:'Turn Partner into Spouse (requires ring $5K)', apCost:10, moneyCost:5000, available:G.ap>=10 && G.cash>=5000, action:proposeMarriage });
    acts.push({ id:'prenup', name:'Sign Prenuptial Agreement', desc:'Protect assets in case of divorce: $3K lawyer fee', apCost:5, moneyCost:3000, available:G.ap>=5 && G.cash>=3000 && !G.hasPrenup, action:() => {
      useAP(5); G.cash -= 3000; G.hasPrenup = true;
      addLog(`Prenuptial agreement signed. Your assets are protected in case of divorce.`, 'success');
    }});
  }
  if(G.npcs.find(n=>n.relation==='Spouse') && age >= 22 && age < 50) {
    acts.push({ id:'have_child', name:'Have a Child', desc:'Life-changing. +expenses, +happiness (maybe)', apCost:20, moneyCost:5000, available:G.ap>=20 && G.cash>=5000 && !G.npcs.find(n=>n.relation==='Child'), action:haveChild });
  }

  // === CRIMINAL ACTIVITIES (karma-based unlocks) ===
  if(age >= 16 && !G.inPrison) {
    acts.push({ id:'crime_petty', name:'Petty Theft', desc:'Low risk, low reward. Karma -5', apCost:15, moneyCost:0, available:G.ap>=15, action:() => commitCrime('petty') });
    if(G.smarts >= 40) {
      acts.push({ id:'crime_fraud', name:'Financial Fraud / Scam', desc:'High reward, high risk. Requires Smarts 40+', apCost:40, moneyCost:0, available:G.ap>=40, action:() => commitCrime('fraud') });
    }
    if(G.job !== 'none' && G.salary > 40000) {
      acts.push({ id:'crime_corp', name:'Corporate Embezzlement', desc:'High reward if caught later. Karma -20', apCost:30, moneyCost:0, available:G.ap>=30, action:() => commitCrime('corporate') });
    }
  }

  // === ENTERTAINMENT ===
  acts.push({ id:'entertainment', name:'Entertainment / Vacation', desc:'Recharge. Stress -25, Sanity +10', apCost:25, moneyCost:500*G.inflation, available:G.ap>=25 && G.cash>=300, action:() => {
    const cost = 500*G.inflation;
    useAP(25); G.cash -= cost;
    modStress(-25); modStat('sanity', 10); modStat('health', 3);
    addLog(`You took a well-deserved break. Stress -25, Sanity +10.`, 'success');
  }});

  // === LOANS / FINANCE ===
  if(age >= 18 && G.creditScore >= 580) {
    acts.push({ id:'take_loan', name:'Personal Loan ($10K)', desc:`Credit score: ${G.creditScore}. Rate: ${loanRate().toFixed(1)}%`, apCost:10, moneyCost:0, available:G.ap>=10 && G.creditScore>=500, action:takeLoan });
  }

  return acts;
}

function useAP(amount) {
  G.ap = clamp(G.ap - amount, 0, G.maxAP);
}

function getJobTitle() {
  const job = JOBS.find(j=>j.id===G.job);
  return job ? job.title : 'Unemployed';
}

function loanRate() {
  // Inverse relationship with credit score
  if(G.creditScore >= 750) return 6;
  if(G.creditScore >= 700) return 8;
  if(G.creditScore >= 650) return 11;
  if(G.creditScore >= 600) return 15;
  return 22; // bad credit
}

function addDebt(name, amount, rate, minPayment) {
  G.debts.push({ id: Math.random().toString(36).slice(2), name, amount, rate, minPayment });
}

function takeLoan() {
  useAP(10);
  const rate = loanRate() / 100;
  const amount = 10000;
  G.cash += amount;
  addDebt('Personal Loan', amount, rate, 300);
  addLog(`Took personal loan of $10,000 at ${(rate*100).toFixed(0)}% APR. Monthly minimum: $300.`, 'warn');
}

function findJob() {
  useAP(30);
  // Find best eligible job
  const eligibleJobs = JOBS.filter(j =>
    j.id !== 'none' &&
    G.age >= j.minAge &&
    G.smarts >= j.minSmarts &&
    G.education >= j.minEdu
  ).sort((a,b) => b.baseSalary - a.baseSalary);

  if(eligibleJobs.length === 0) {
    addLog(`No eligible jobs found. Improve your education and skills.`, 'warn');
    return;
  }
  const bestJob = eligibleJobs[0];
  const salaryVariance = rngFloat(0.9, 1.1);
  const charismaBonus = (G.charisma / 100) * 0.1;
  const traitBonus = hasTrait('hustler') ? 0.1 : 0;
  G.job = bestJob.id;
  G.salary = bestJob.baseSalary * salaryVariance * (1 + charismaBonus + traitBonus);
  G.jobPerformance = 50;
  G.jobQuartersHeld = 0;
  addLog(`🎉 Got a job as <b>${bestJob.title}</b>! Annual salary: <b>${fmtMoney(G.salary)}</b>.`, 'success');
  modStat('reputation', 10);
}

function seekPromotion() {
  useAP(20);
  const chance = G.jobPerformance/100 * (G.charisma/100 * 0.5 + 0.5);
  if(Math.random() < chance) {
    const raise = G.salary * rngFloat(0.15, 0.30);
    G.salary += raise;
    G.jobPerformance = 50; // Reset after promotion
    G.jobQuartersHeld = 0;
    addLog(`🎊 <b>Promoted!</b> Salary increase: ${fmtMoney(raise)}. New salary: ${fmtMoney(G.salary)}.`, 'success');
    modStat('reputation', 15);
    modStress(10);
  } else {
    addLog(`Promotion denied. Keep building performance and try again.`, 'warn');
    modStress(15);
  }
}

function startBusiness() {
  useAP(40);
  G.cash -= 20000;
  G.company = {
    name: `${G.name}'s Ventures`,
    capital: 20000,
    employees: 2,
    employeeSalary: 5000, // per employee per quarter
    marketing: 2000, // quarterly
    price: 299, // product price
    revenue: 0,
    profit: 0,
    cashflowNeg: 0,
  };
  addLog(`🏢 <b>${G.company.name}</b> founded! Invested $20,000 capital. Manage from the Business panel.`, 'success');
  modStat('reputation', 10);
}

function buyHome() {
  useAP(20);
  const downPayment = 30000;
  const homeValue = 300000;
  const loanAmt = homeValue - downPayment;
  const rate = loanRate() / 100;
  const quarterlyPayment = loanAmt * (rate/4) / (1 - Math.pow(1+rate/4, -120)); // 30yr
  G.cash -= downPayment;
  G.properties.push({
    id: Math.random().toString(36).slice(2),
    name: 'Primary Residence',
    value: homeValue,
    mortgage: quarterlyPayment,
    type: 'residence',
  });
  addDebt('Home Mortgage (30yr)', loanAmt, rate, quarterlyPayment);
  addLog(`🏠 Purchased a home! Down payment: $30,000. Mortgage: ${fmtMoney(quarterlyPayment)}/qtr at ${(rate*100).toFixed(0)}% APR.`, 'success');
}

function startDating() {
  useAP(20); G.cash -= 200*G.inflation;
  const partnerNames = ['Sam','Chris','Robin','Lee','Avery','Blake'];
  const name = partnerNames[rng(partnerNames.length)];
  G.npcs.push(createNPC(name, 'Partner', '💑', G.age + rng(10) - 5));
  addLog(`❤️ You started dating <b>${name}</b>! New relationship begins.`, 'success');
}

function proposeMarriage() {
  useAP(10); G.cash -= 5000;
  const partner = G.npcs.find(n=>n.relation==='Partner');
  if(!partner) return;
  const chance = (partner.relationship + partner.trust) / 200;
  if(Math.random() < chance) {
    partner.relation = 'Spouse';
    partner.dependency = 40;
    addLog(`💍 <b>${partner.name}</b> said YES! You are now married.`, 'success');
    modStat('sanity', 10); modStress(-10);
    if(!G.hasPrenup) addLog(`⚠️ No prenuptial agreement signed. In case of divorce, 50% of assets at risk.`, 'warn');
  } else {
    addLog(`💔 <b>${partner.name}</b> said no. It's not the right time.`, 'danger');
    modStat('sanity', -10); modStress(15);
  }
}

function haveChild() {
  useAP(20); G.cash -= 5000;
  const childName = ['Zoe','Eli','Mia','Noah','Emma','Liam'][rng(6)];
  G.npcs.push(createNPC(childName, 'Child', '👶', 0));
  addLog(`👶 <b>${childName}</b> is born! A new chapter of your life begins. +$5K initial costs.`, 'success');
  modStat('sanity', 10); modStress(20);
}

// Criminal system with detection probability
function commitCrime(type) {
  const crimes = {
    petty: { name:'Petty Theft', reward: [200,800], ap:15, detectBase:0.15, jailQtrs:2, karma:-5, repHit:-5 },
    fraud: { name:'Financial Fraud', reward:[3000,15000], ap:40, detectBase:0.25, jailQtrs:6, karma:-15, repHit:-20 },
    corporate: { name:'Corporate Embezzlement', reward:[10000,80000], ap:30, detectBase:0.20, jailQtrs:8, karma:-20, repHit:-30 },
  };
  const c = crimes[type];
  if(!c) return;
  useAP(c.ap);
  G.karma = clamp(G.karma + c.karma, 0, 100);
  // Detection probability: inversely proportional to smarts
  const detectChance = c.detectBase * (1 - G.smarts/200) * (hasTrait('unlucky') ? 1.3 : 1);
  if(Math.random() < detectChance) {
    // CAUGHT
    G.criminalRecord++;
    G.arrested = true;
    addLog(`🚨 <b>CAUGHT!</b> Arrested for ${c.name}. Criminal record: ${G.criminalRecord}.`, 'danger');
    updateCreditScore(-60);
    modStat('reputation', c.repHit * 2);
    queueDialog({
      title: `⚖️ Court Hearing — ${c.name}`,
      sub: `Criminal Record: ${G.criminalRecord}`,
      body: `You have been charged with <b>${c.name}</b>. How do you plead and proceed?`,
      choices: [
        { label:'Hire Expensive Lawyer ($15,000)', cost:'$15,000', action:() => {
          if(G.cash >= 15000) {
            G.cash -= 15000;
            const jailTime = Math.max(1, Math.floor(c.jailQtrs * 0.3));
            G.inPrison = true; G.prisonQuarters = jailTime;
            addLog(`Lawyer negotiated reduced sentence: <b>${jailTime} quarters</b> in prison.`, 'warn');
          } else {
            addLog(`Can't afford it. Public defender assigned.`, 'danger');
            G.inPrison = true; G.prisonQuarters = c.jailQtrs;
          }
        }},
        { label:'Public Defender (Free)', cost:'Higher sentence risk', action:() => {
          G.inPrison = true;
          G.prisonQuarters = c.jailQtrs + rng(4);
          addLog(`Public defender failed to reduce sentence. <b>${G.prisonQuarters} quarters</b> in prison.`, 'danger');
        }},
        { label:'Flee the Country ($20,000)', cost:'$20,000 + stats hit', action:() => {
          if(G.cash >= 20000) {
            G.cash -= 20000;
            modStat('reputation', -40);
            addLog(`You fled the country. Warrant out for your arrest. Reputation destroyed.`, 'danger');
          } else {
            addLog(`Can't afford to flee. Sentenced anyway.`, 'danger');
            G.inPrison = true; G.prisonQuarters = c.jailQtrs;
          }
        }},
      ]
    });
  } else {
    // GOT AWAY
    const reward = rng(c.reward[1]-c.reward[0]) + c.reward[0];
    G.cash += reward;
    modStat('reputation', c.repHit);
    addLog(`Got away with ${c.name}. Gained <b>${fmtMoney(reward)}</b>. But karma strikes back eventually.`, 'warn');
  }
}

// ============================================================
// MARKET OPERATIONS (buy/sell)
// ============================================================
function buyAsset(assetId, qty=1) {
  if(G.ap < 10) { addLog('Not enough AP to trade.', 'warn'); return; }
  const price = G.assetPrices[assetId];
  const total = price * qty;
  if(G.cash < total) { addLog(`Insufficient cash. Need ${fmtMoney(total)}.`, 'warn'); return; }
  useAP(10);
  G.cash -= total;
  G.portfolio[assetId] = (G.portfolio[assetId]||0) + qty;
  const asset = ASSETS.find(a=>a.id===assetId);
  addLog(`📈 Bought ${qty}x <b>${asset.name}</b> @ ${fmtMoney(price)} each. Total: ${fmtMoney(total)}.`, 'success');
  renderAll();
}

function sellAsset(assetId, qty=1) {
  if(G.portfolio[assetId] < qty) { addLog('You don\'t own enough shares.', 'warn'); return; }
  if(G.ap < 5) { addLog('Not enough AP to trade.', 'warn'); return; }
  useAP(5);
  const price = G.assetPrices[assetId];
  const total = price * qty;
  G.cash += total;
  G.portfolio[assetId] -= qty;
  const asset = ASSETS.find(a=>a.id===assetId);
  addLog(`📉 Sold ${qty}x <b>${asset.name}</b> @ ${fmtMoney(price)} each. Received: ${fmtMoney(total)}.`, 'success');
  renderAll();
}

function statBarColor(val) {
  if(val >= 70) return 'var(--green)';
  if(val >= 40) return 'var(--yellow)';
  return 'var(--red)';
}

function renderStatRow(label, val, max=100) {
  const pct = (val/max)*100;
  const color = statBarColor(pct);
  return `<div class="stat-row">
    <span class="stat-label" style="font-size:10px">${label}</span>
    <div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${color}"></div></div>
    <span class="stat-val" style="color:${color}">${Math.round(val)}</span>
  </div>`;
}

function renderStatus() {
  document.getElementById('stats-physical').innerHTML =
    renderStatRow('Health',G.health) +
    renderStatRow('Appearance',G.appearance) +
    renderStatRow('Stamina',G.stamina) +
    renderStatRow('Immune',G.immune);

  document.getElementById('stats-mental').innerHTML =
    renderStatRow('Smarts',G.smarts) +
    renderStatRow('Sanity',G.sanity) +
    renderStatRow('Stress',G.stress) +
    renderStatRow('Focus',G.focus);

  const creditColor = G.creditScore >= 700 ? 'var(--green)' : G.creditScore >= 600 ? 'var(--yellow)' : 'var(--red)';
  document.getElementById('stats-social').innerHTML =
    renderStatRow('Reputation',G.reputation) +
    renderStatRow('Charisma',G.charisma) +
    renderStatRow('Karma',G.karma) +
    `<div class="stat-row">
      <span class="stat-label" style="font-size:10px">Credit</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${((G.creditScore-300)/550)*100}%;background:${creditColor}"></div></div>
      <span class="stat-val" style="color:${creditColor}">${G.creditScore}</span>
    </div>`;

  // Traits
  const traitsHtml = G.traits.map(tid => {
    const t = TRAITS.find(x=>x.id===tid);
    if(!t) return '';
    return `<span class="trait-chip trait-${t.type}" title="${t.desc}">${t.name}</span>`;
  }).join('');
  document.getElementById('traits-panel').innerHTML = traitsHtml || '<span style="color:var(--text-muted);font-size:11px">No special traits</span>';

  // Life stage
  const diseases = G.diseases.map(d=>{
    const def = DISEASES.find(x=>x.id===d.id);
    return def ? `<span class="badge badge-red">⚕ ${def.name} (${d.remaining}qtrs)</span>` : '';
  }).join(' ');
  document.getElementById('life-stage-info').innerHTML =
    `<b>${getLifeStage()}</b> — ${G.name}, ${G.gender}<br>
    Education: <b>${['None','High School','Bachelor\'s','Master\'s'][G.education]}</b><br>
    ${G.inSchool ? `<span class="badge badge-blue">📚 In School (GPA: ${G.gpa.toFixed(0)})</span><br>` : ''}
    ${G.inPrison ? `<span class="badge badge-red">🔒 INCARCERATED</span><br>` : ''}
    ${diseases}
    ${G.pandemicActive ? '<br><span class="badge badge-orange">🦠 Pandemic Active</span>' : ''}
    ${G.warActive ? '<br><span class="badge badge-red">⚔️ War Active</span>' : ''}
    ${G.economy !== 'normal' ? `<br><span class="badge badge-${G.economy==='boom'?'green':'red'}">${G.economy==='boom'?'📈 Economic Boom':'📉 Recession'}</span>` : ''}`;
}

function renderActivities() {
  const prisonNotice = document.getElementById('prison-notice');
  prisonNotice.style.display = G.inPrison ? 'block' : 'none';
  if(G.inPrison) document.getElementById('prison-time').textContent = `${G.prisonQuarters} quarters remaining`;

  const list = document.getElementById('activities-list');
  const acts = getActivities();
  if(acts.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:10px">No activities available at this life stage.</div>';
    return;
  }
  list.innerHTML = acts.map(a => `
    <button class="act-btn" onclick="doActivity('${a.id}')" ${!a.available||G.ap<=0?'disabled':''}>
      <div>
        <div class="act-btn-name">${a.name}</div>
        <div class="act-btn-desc">${a.desc}</div>
      </div>
      <div class="act-btn-cost">
        <span class="cost-ap">${a.apCost > 0 ? a.apCost+' AP' : '—'}</span>
        ${a.moneyCost > 0 ? `<span class="cost-money">${fmtMoney(a.moneyCost)}</span>` : ''}
      </div>
    </button>
  `).join('');
}

function doActivity(id) {
  const acts = getActivities();
  const act = acts.find(a=>a.id===id);
  if(act && act.action && act.available) {
    act.action();
    renderAll();
    setTimeout(processDialogQueue, 200);
  }
}

  const panel = document.getElementById('market-panel');
  const rows = ASSETS.map(a => {
    const price = G.assetPrices[a.id];

    const prev = hist.length >= 2 ? hist[hist.length-2] : price;
    const change = ((price-prev)/prev)*100;
    const owned = G.portfolio[a.id];

    return `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:6px;">

            <div style="font-size:11px;font-weight:600;">${a.name}</div>
            <div style="font-size:9px;color:var(--text-muted);">${a.type.toUpperCase()} · Volatility: ${(a.volatility*100).toFixed(0)}%</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:13px;font-weight:700;">${a.type==='crypto'?'$'+price.toFixed(2):fmtMoney(price)}</div>
            <div style="font-size:10px;color:${change>=0?'var(--green)':'var(--red)'}">${change>=0?'▲':'▼'}${Math.abs(change).toFixed(2)}%</div>
